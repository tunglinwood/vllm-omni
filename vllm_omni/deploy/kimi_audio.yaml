# Kimi Audio deploy: Stage 0 (LLM with bifurcation) -> Stage 1 (audio detokenizer).
#
# Full audio I/O: text+audio in → text+audio out
# Stage 0: Shared backbone (layers 0-21) → bifurcation → text path (layers 22-27) + audio path (6 MIMO layers)
# Stage 1: Flow-matching audio detokenizer → vocoder → 24kHz waveform

async_chunk: true

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      shm_threshold_bytes: 365536
      codec_streaming: true
      connector_get_sleep_s: 0.001
      connector_get_max_wait_first_chunk: 3000
      connector_get_max_wait: 300
      codec_chunk_frames: 50  # 50 tokens = 1 second at 50 tok/s
      codec_left_context_frames: 0

stages:
  # Stage 0: LLM with bifurcation (text + audio logits)
  - stage_id: 0
    max_num_seqs: 1
    gpu_memory_utilization: 0.7  # Tuned up from 0.6 based on GPU utilization
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    async_scheduling: false
    max_num_batched_tokens: 8192
    max_model_len: 8192
    devices: "6"
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.7
      top_p: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.0

  # Stage 1: Flow-matching detokenizer + vocoder
  - stage_id: 1
    max_num_seqs: 1
    gpu_memory_utilization: 0.85  # Tuned up from 0.8 based on GPU utilization
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    async_scheduling: false
    max_num_batched_tokens: 8192
    max_model_len: 8192
    devices: "6"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.0  # Greedy for deterministic detokenization
      top_p: 1.0
      top_k: -1
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.0
