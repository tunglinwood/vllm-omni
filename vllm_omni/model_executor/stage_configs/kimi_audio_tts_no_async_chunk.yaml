# Stage config for Kimi-Audio TTS with 2-stage architecture (NON-ASYNC-CHUNK MODE)
# Stage 0: Talker (text → audio tokens)
# Stage 1: Code2Wav (audio tokens → waveform)
#
# Use this config for offline inference with the `Omni` class.
# For streaming mode with `AsyncOmni`, use kimi_audio_tts.yaml (async_chunk: true).

async_chunk: false
stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 1
    engine_args:
      model_stage: kimi_audio_talker
      model_arch: KimiAudioTalkerForConditionalGeneration
      hf_overrides:
        architectures: [KimiAudioTalkerForConditionalGeneration]
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: false
      enable_prefix_caching: false
      gpu_memory_utilization: 0.50
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 2048
      max_model_len: 2048
      engine_output_type: latent
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      detokenize: false
      repetition_penalty: 1.05
      stop_token_ids: [151645]

  - stage_id: 1
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 1
    engine_args:
      model_stage: kimi_audio_code2wav
      model_arch: KimiAudioCode2Wav
      hf_overrides:
        architectures: [KimiAudioCode2Wav]
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: false
      enable_prefix_caching: false
      engine_output_type: audio
      gpu_memory_utilization: 0.40
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 8192
      max_model_len: 8192
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.kimi_audio_tts.talker2detokenizer
    final_output: true
    final_output_type: audio
    tts_args:
      max_instructions_length: 500
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      detokenize: true
      repetition_penalty: 1.0
