# Stage config for running Kimi-Audio TTS for multi-stage omni runtime.
#
# Two-stage pipeline on single GPU:
#   Stage 0: kimi_fused -- Qwen2 backbone + MIMO layers -> text + audio codes
#   Stage 1: code2wav -- DiT detokenizer -> waveform

async_chunk: false
stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      devices: "0"
    engine_args:
      dtype: bfloat16
      max_num_seqs: 1
      model_stage: fused_thinker_talker
      model_arch: KimiAudioFusedForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.25
      enforce_eager: true
      trust_remote_code: true
      enable_prefix_caching: false
      attention_backend: FLASH_ATTN
      engine_output_type: latent
      max_model_len: 8192
      max_num_batched_tokens: 8192
    is_comprehension: true
    final_output: true
    final_output_type: text
    default_sampling_params:
      temperature: 0.0
      top_k: 5
      max_tokens: 2048
      seed: 42
      detokenize: true
      repetition_penalty: 1.0
      ignore_eos: false
      stop_token_ids: [151667]

  - stage_id: 1
    stage_type: llm
    runtime:
      devices: "1"
    engine_args:
      model_stage: code2wav
      max_num_seqs: 1
      model_arch: KimiAudioCode2WavForConditionalGeneration
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.65
      enforce_eager: true
      trust_remote_code: true
      enable_prefix_caching: false
      attention_backend: FLASH_ATTN
      engine_output_type: audio
      max_model_len: 8192
      max_num_batched_tokens: 8192
      async_scheduling: false
    engine_input_source: [0]
    is_comprehension: false
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.kimia_audio.fused2code2wav
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 2048
      seed: 42
      detokenize: false
